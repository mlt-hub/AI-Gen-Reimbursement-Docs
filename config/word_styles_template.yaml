# ============================================================
# Word 文档样式模板配置
# 来源: data/word_template.docx
# 用途: 描述第4章（功能需求）中使用的所有样式定义，
#        用于后续对其他 word 文档进行样式清洗
# ============================================================

# ---------- 章节层级样式 ----------
# 用于定义文档的大纲层级结构
heading_hierarchy:
  Heading 1:           # 章节标题（如 "功能需求"、"附加值调整因子说明"）
    level: "section"   #   对应 COSMIC 的章节标记
    font: {name: ~, size: 279400, bold: true}        # 22pt 加粗
    paragraph: {space_before: 215900, space_after: 209550}
    numbering: {abstractNumId: 11, ilvl: 0, format: "%1."}
                       # 编号格式: 1. / 2. / 3. ...

  Heading 2:           # 一级模块标题（如 "小福包专区"）
    level: "L1"
    font: {name: ~, size: 228600, bold: true}        # 18pt 加粗
    paragraph: {space_before: 165100, space_after: 165100}
    numbering: {abstractNumId: 11, ilvl: 1, format: "%1.%2."}
                       # 编号格式: 4.1 / 4.2 / ...

  Heading 3:           # 二级模块标题（如 "装修管理"）
    level: "L2"
    font: {name: ~, size: 203200, bold: true}        # 16pt 加粗
    paragraph: {space_before: 165100, space_after: 165100}
    numbering: {abstractNumId: 11, ilvl: 2, format: "%1.%2.%3."}
                       # 编号格式: 4.1.1 / 4.1.2 / ...

  Heading 4:           # 三级模块标题（如 "基础配置"）
    level: "L3"
    font: {name: ~, size: 152400, bold: true}        # 12pt 加粗
    paragraph: {space_before: 63500, space_after: 63500}
    numbering: {abstractNumId: 11, ilvl: 3, format: "%1.%2.%3.%4."}
                       # 编号格式: 4.1.1.1 / 4.1.1.2 / ...

# ---------- 正文样式 ----------
body_styles:
  正文（缩进）:              # 功能描述和功能过程
    usage: "功能描述 + 功能过程名称"
    font: {name: "宋体", size: ~, bold: false}
    paragraph: {first_line_indent: 304800}           # 首行缩进2字符
    special_rules:
      - 以"功能描述："开头的段落 → 作为功能描述
      - 其他段落 → 作为功能过程名称
    # 注意: 功能描述段落 bold=true, 功能过程段落 bold=false
    #       可通过bold区分两者

# ---------- 编号列表格式 ----------
numbering_formats:

  - id: "decimal_%)"               # 1) 2) 3) 格式
    abstractNumId_range: [1, 39]
    ilvl: 0
    format: "decimal"
    text: "%1)"                     # 显示为 1) 2) 3)

  - id: "outline_%1.%2"            # 4.1 / 4.1.1 格式
    abstractNumId: 11
    ilvl_range: [1, 8]
    format: "decimal"
    text: "%1.%2.%3.%4.%5.%6.%7.%8.%9."
    description: "多层次标题编号"

  - id: "outline_%2、"             # 1、1.1 格式
    abstractNumId: 33
    ilvl_range: [1, 6]
    format: "decimal"
    text: '%2、 / %2.%3 / ...'

  - id: "outline_%1.%2"            # 4.1 / 4.1.1 格式（变体）
    abstractNumId: 40
    ilvl_range: [1, 8]
    format: "decimal"
    text: "%1.%2"

# ---------- 标题编号映射方案 ----------
# 将此模板用于 cosmic 工具的 docx_style_schemes
cosmic_scheme:
  name: "标准模板方案"
  toc:
    section_style: "Heading 1"
    section_number: "4"
    section_keyword: "功能需求"
    l1_style: "Heading 2"
    l2_style: "Heading 3"
  detail:
    start_style: "Heading 4"
    end_style: "Heading 1"
    end_keyword: "附加值调整因子"
    l2_style: "Heading 3"
    l3_style: "Heading 4"
    process_style: "正文（缩进）"
