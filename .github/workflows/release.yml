name: 构建发布

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install pyinstaller
          pip install -e .

      - name: 读取版本号
        shell: pwsh
        run: |
          $ver = Select-String -Path pyproject.toml -Pattern '^version = "(.+)"' | ForEach-Object { $_.Matches.Groups[1].Value }
          echo "version=$ver" >> $env:GITHUB_ENV

      - name: 构建 exe
        shell: pwsh
        run: |
          pyinstaller --onefile `
            --name ard `
            --add-data "$env:GITHUB_WORKSPACE\ai_gen_reimbursement_docs;ai_gen_reimbursement_docs" `
            --add-data "$env:GITHUB_WORKSPACE\pyproject.toml;." `
            --hidden-import "openpyxl.cell._writer" `
            --collect-all "fastapi" `
            --collect-all "uvicorn" `
            --collect-all "starlette" `
            --collect-all "python_multipart" `
            --distpath dist --workpath build --specpath build --console `
            "$env:GITHUB_WORKSPACE\ai_gen_reimbursement_docs\main.py"

      - name: 打包附加文件
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\data | Out-Null
          New-Item -ItemType Directory -Force -Path dist\config | Out-Null
          # 生成版本标记文件
          "ai-gen-reimbursement-docs v$env:version" | Out-File -Encoding utf8 "dist\ard_v$env:version"
          Copy-Item README.md dist\README.md -Force
          Copy-Item CHANGELOG.md dist\CHANGELOG.md -Force
          Copy-Item data\out_templates dist\data\out_templates -Recurse -Force
          Copy-Item data\in_templates dist\data\in_templates -Recurse -Force
          Copy-Item data\audio dist\data\audio -Recurse -Force
          Copy-Item config\.env.example dist\config\.env.example -Force
          Copy-Item config\system_config.yaml.example dist\config\system_config.yaml.example -Force
          Copy-Item config\business_rules.yaml.example dist\config\business_rules.yaml.example -Force
          Copy-Item web_app dist\web_app -Recurse -Force
          Compress-Archive -Path dist\* -DestinationPath "ard_v$env:version.zip"

      - name: 创建 Release（本仓）
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "v${{ env.version }}"
          body_path: CHANGELOG.md
          files: |
            ard_v${{ env.version }}.zip

      - name: 手动触发时创建 Release（用 gh CLI）
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = "${{ env.version }}"
          $tag = "v$ver"
          $zip = "ard_v$ver.zip"
          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag 已存在，更新资产..."
            gh release upload $tag "$zip" --clobber
          } else {
            gh release create $tag "$zip" `
              --title "v$ver" --notes-file CHANGELOG.md `
              --target "${{ github.sha }}"
          }
          Write-Host "已创建 Release: https://github.com/mlt-hub/AI-Gen-Reimbursement-Docs/releases/tag/$tag"

      - name: 推送到发布仓（mlt-hub/ai-gen-reimbursement-docs-release）
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if (-not "$env:GH_TOKEN") {
            Write-Host "跳过推送发布仓：未设置 RELEASE_TOKEN"
            return
          }
          $ver = "${{ env.version }}"
          $zip = "ard_v$ver.zip"
          $tag = "v$ver"
          $release_repo = "mlt-hub/ai-gen-reimbursement-docs-release"
          # 检查发布仓是否存在
          gh repo view $release_repo --json name 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh repo create $release_repo --public --description "AI报账文档生成器发布包" --add-readme
          }
          # 创建或更新 Release
          gh release view $tag --repo $release_repo 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag 已存在，更新资产..."
            gh release upload $tag "$zip" --repo $release_repo --clobber
          } else {
            Write-Host "创建 Release $tag..."
            gh release create $tag "$zip" --repo $release_repo `
              --title "v$ver" --notes-file CHANGELOG.md
          }
          Write-Host "已推送至发布仓: https://github.com/mlt-hub/ai-gen-reimbursement-docs-release/releases/tag/$tag"
