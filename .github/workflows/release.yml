name: жһ„е»әеҸ‘еёғ

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: е®үиЈ… Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: е®үиЈ… Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web_app/package-lock.json

      - name: е®үиЈ… Python дҫқиө–
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e ".[dev]"

      - name: е®үиЈ…еүҚз«Ҝдҫқиө–
        shell: pwsh
        working-directory: web_app
        run: npm ci

      - name: иҜ»еҸ–зүҲжң¬еҸ·
        id: version
        shell: pwsh
        run: |
          $ver = Select-String -Path pyproject.toml -Pattern '^version = "(.+)"' | ForEach-Object { $_.Matches.Groups[1].Value }
          echo "version=$ver" >> $env:GITHUB_ENV
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: еҸ‘еёғеүҚжЈҖжҹҘпјҲдёҚжЈҖжҹҘдә§зү©пјү
        shell: pwsh
        run: .\scripts\check_release.ps1 -SkipArtifactCheck

      - name: жһ„е»әеҸ—дҝқжҠӨеҸ‘еёғеҢ…
        shell: pwsh
        run: .\build_exe.ps1 -RequireProtectedData

      - name: еҸ‘еёғеҢ…жЈҖжҹҘ
        shell: pwsh
        run: .\scripts\check_release.ps1 -RequireProtectedData

      - name: е®үиЈ… Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: зј–иҜ‘ Inno Setup е®үиЈ…еҢ…
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$env:version" ard.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup зј–иҜ‘еӨұиҙҘ" }

      - name: жЈҖжҹҘе®үиЈ…еҢ…ж•°жҚ®дҝқжҠӨ
        shell: pwsh
        run: |
          $extractDir = Join-Path $env:RUNNER_TEMP "ard-setup-check"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /? | Out-Null
          .\scripts\check_release_data_protection.ps1 -ArtifactDir .\dist\ard -RequireProtectedData

      - name: еҲӣе»ә ReleaseпјҲжң¬д»“пјү
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "v${{ env.version }}"
          body_path: CHANGELOG.md
          files: |
            dist/ard-v${{ env.version }}.zip
            ard-setup_v${{ env.version }}.exe

      - name: жүӢеҠЁи§ҰеҸ‘ж—¶еҲӣе»ә ReleaseпјҲз”Ё gh CLIпјү
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = "${{ env.version }}"
          $tag = "v$ver"
          $zip = "dist\ard-v$ver.zip"
          $setup = "ard-setup_v$ver.exe"
          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag е·ІеӯҳеңЁпјҢжӣҙж–°иө„дә§..."
            gh release upload $tag "$zip" --clobber
            gh release upload $tag "$setup" --clobber
          } else {
            gh release create $tag $zip $setup `
              --title "v$ver" --notes-file CHANGELOG.md `
              --target "${{ github.sha }}"
          }
          Write-Host "е·ІеҲӣе»ә Release: https://github.com/mlt-hub/AI-Gen-Reimbursement-Docs/releases/tag/$tag"

      - name: жҺЁйҖҒеҲ°еҸ‘еёғд»“
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if (-not "$env:GH_TOKEN") {
            Write-Host "и·іиҝҮжҺЁйҖҒеҸ‘еёғд»“пјҡжңӘи®ҫзҪ® RELEASE_TOKEN"
            return
          }
          $ver = "${{ env.version }}"
          $zip = "dist\ard-v$ver.zip"
          $setup = "ard-setup_v$ver.exe"
          $tag = "v$ver"
          $release_repo = "mlt-hub/ai-gen-reimbursement-docs-release"
          gh repo view $release_repo --json name 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh repo create $release_repo --public --description "AIз”ҹжҲҗйЎ№зӣ®жҠҘиҙҰж–ҮжЎЈеҸ‘еёғеҢ…" --add-readme
          }
          gh release view $tag --repo $release_repo 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag е·ІеӯҳеңЁпјҢжӣҙж–°иө„дә§..."
            gh release upload $tag $zip $setup --repo $release_repo --clobber
          } else {
            Write-Host "еҲӣе»ә Release $tag..."
            gh release create $tag $zip $setup --repo $release_repo `
              --title "v$ver" --notes-file CHANGELOG.md
          }
          Write-Host "е·ІжҺЁйҖҒиҮіеҸ‘еёғд»“: https://github.com/mlt-hub/ai-gen-reimbursement-docs-release/releases/tag/$tag"
