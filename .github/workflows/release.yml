name: 构建发布

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install pyinstaller
          pip install -e .

      - name: 读取版本号
        shell: pwsh
        run: |
          $ver = Select-String -Path pyproject.toml -Pattern '^version = "(.+)"' | ForEach-Object { $_.Matches.Groups[1].Value }
          echo "version=$ver" >> $env:GITHUB_ENV

      - name: 构建 exe
        shell: pwsh
        run: |
          pyinstaller --onefile `
            --name cosmic `
            --add-data "$env:GITHUB_WORKSPACE\cosmic_tool;cosmic_tool" `
            --add-data "$env:GITHUB_WORKSPACE\data\templates;data\templates" `
            --hidden-import "openpyxl.cell._writer" `
            --distpath dist --workpath build --specpath build --console `
            "$env:GITHUB_WORKSPACE\cosmic_tool\main.py"

      - name: 打包附加文件
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\data | Out-Null
          New-Item -ItemType Directory -Force -Path dist\config | Out-Null
          # 生成版本标记文件
          "cosmic-tool v$env:version" | Out-File -Encoding utf8 "dist\cosmic_v$env:version"
          Copy-Item README.md dist\README.md -Force
          Copy-Item CHANGELOG.md dist\CHANGELOG.md -Force
          Copy-Item data\templates dist\data\templates -Recurse -Force
          Copy-Item config\.env.example dist\config\.env.example -Force
          Copy-Item config\system_config.yaml.example dist\config\system_config.yaml.example -Force
          Copy-Item config\business_rules.yaml.example dist\config\business_rules.yaml.example -Force
          Copy-Item web_app dist\web_app -Recurse -Force
          Compress-Archive -Path dist\* -DestinationPath "ard_v$env:version.zip"

      - name: 创建 Release（本仓）
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "v${{ env.version }}"
          body_path: CHANGELOG.md
          files: |
            cosmic_v${{ env.version }}.zip

      - name: 手动触发时创建 Release（用 gh CLI）
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = "${{ env.version }}"
          $tag = "v$ver"
          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag 已存在，更新资产..."
            gh release upload $tag "cosmic_v$ver.zip" --clobber
          } else {
            gh release create $tag "cosmic_v$ver.zip" `
              --title "v$ver" --notes-file CHANGELOG.md `
              --target "${{ github.sha }}"
          }
          Write-Host "已创建 Release: https://github.com/mlt-hub/cosmic-tool/releases/tag/$tag"

      - name: 推送到发布仓（mlt-hub/cosmic-tool-release）
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if (-not "$env:GH_TOKEN") {
            Write-Host "跳过推送发布仓：未设置 RELEASE_TOKEN"
            return
          }
          $ver = "${{ env.version }}"
          $zip = "cosmic_v$ver.zip"
          $tag = "v$ver"
          # 检查发布仓是否存在
          gh repo view mlt-hub/cosmic-tool-release --json name 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            # 创建发布仓（含 README 避免空仓）
            gh repo create mlt-hub/cosmic-tool-release --public --description "COSMIC 功能点拆分工具发布包" --add-readme
          }
          # 检查是否空仓（无提交的仓库无法创建 release）
          $empty = gh api "repos/mlt-hub/cosmic-tool-release/contents" 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            # 空仓，初始化一次
            gh repo clone mlt-hub/cosmic-tool-release temp_repo 2>$null | Out-Null
            if (Test-Path temp_repo) {
              cd temp_repo
              "# COSMIC 功能点拆分工具发布包" | Out-File -Encoding utf8 README.md
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -A; git commit -m "初始化"
              git push
              cd ..
              Remove-Item -Recurse -Force temp_repo
            }
          }
          # 创建或更新 Release
          gh release view $tag --repo mlt-hub/cosmic-tool-release 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag 已存在，更新资产..."
            gh release upload $tag "$zip" --repo mlt-hub/cosmic-tool-release --clobber
          } else {
            Write-Host "创建 Release $tag..."
            gh release create $tag "$zip" --repo mlt-hub/cosmic-tool-release `
              --title "v$ver" --notes-file CHANGELOG.md
          }
          Write-Host "已推送至发布仓: https://github.com/mlt-hub/cosmic-tool-release/releases/tag/$tag"
