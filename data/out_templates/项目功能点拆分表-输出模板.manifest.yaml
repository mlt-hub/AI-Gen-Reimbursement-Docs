template_id: cosmic_default_v1
kind: cosmic
version: 1
file: 项目功能点拆分表-输出模板.xlsx
sheets:
  environment:
    name: 1、环境图
    required: true
  result:
    name: 2、功能点拆分表
    header_row: 4
    data_start_row: 6
    style_source_row: 6
    columns:
      project:
        header: 项目
        required: false
      module_l1:
        header: 一级模块
        required: true
      module_l2:
        header: 二级模块
        required: true
      module_l3:
        header: 三级模块
        required: true
      user:
        header: 用户
        required: false
      trigger:
        header: 触发事件
        required: false
      process:
        header: 功能过程
        required: false
      sub_process:
        header: 子过程描述
        required: false
      move_type:
        header: 数据移动类型
        required: false
      data_group:
        header: 数据组
        required: false
      data_attrs:
        header: 数据属性
        required: false
      reuse:
        header: 复用度
        required: false
      cfp:
        header: CFP
        required: false
features:
  preserve_formulas: true
format:
  preserve:
    - column_widths
    - row_heights
    - merged_cells
    - formulas
    - data_validations
