template_id: fpa_default_v1
kind: fpa
version: 1
file: FPA工作量评估-输出模板.xlsx
sheets:
  result:
    name: FPA功能点估算
    header_row: 2
    data_start_row: 3
    style_source_row: 3
    columns:
      function_point_name:
        header: 新增/修改功能点
        required: true
      type:
        header: 类型
        required: true
      classification_basis:
        header: 计算依据归类
        required: true
      explanation:
        header: 计算依据说明，记录关键信息如：事件流、业务规则、业务数据、非功能性规约、表、服务、接口等内容
        required: true
    required_cells:
      - cell: I3
        formula: true
      - cell: L3
        formula: true
  judgement_rules:
    name: 附录1-FPA评估方法说明
    required: true
    required_cells:
      - cell: C1
        contains: 判定原则
features:
  preserve_formulas: true
  judgement_rules_source: template
format:
  preserve:
    - column_widths
    - row_heights
    - merged_cells
    - formulas
  copy_row_style:
    from_row: 3
    apply_to_generated_rows: true
