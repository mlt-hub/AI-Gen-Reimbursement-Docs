<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提示词调试器</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f2f5;
  --panel-bg: #fff;
  --border: #e0e0e0;
  --text: #333;
  --text-secondary: #666;
  --primary: #4a6cf7;
  --primary-hover: #3651d5;
  --success: #22c55e;
  --error: #ef4444;
  --radius: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header a { font-size: 13px; color: var(--primary); text-decoration: none; }
.header a:hover { text-decoration: underline; }

.main {
  flex: 1;
  display: flex;
  gap: 0;
  overflow: hidden;
}

/* 左侧输入区 */
.panel-input {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 16px;
  background: var(--panel-bg);
  min-width: 0;
}

.panel-input label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-input label .hint {
  font-weight: 400;
  font-size: 12px;
}
.panel-input textarea {
  flex: 1;
  min-height: 120px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
  line-height: 1.5;
  resize: vertical;
  background: #fafafa;
  transition: border-color 0.2s;
}
.panel-input textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(74,108,247,0.1);
  background: #fff;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-submit {
  padding: 8px 24px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.btn-submit:hover { background: var(--primary-hover); }
.btn-submit:disabled { background: #a5b4fc; cursor: not-allowed; }

.btn-clear {
  padding: 8px 16px;
  background: var(--bg);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  cursor: pointer;
}
.btn-clear:hover { background: var(--border); }

.status {
  font-size: 13px;
  margin-left: auto;
}
.status-idle { color: var(--text-secondary); }
.status-running { color: var(--primary); }
.status-done { color: var(--success); }
.status-error { color: var(--error); }

/* 高级选项 */
details { font-size: 13px; }
details summary { color: var(--primary); cursor: pointer; user-select: none; }
.adv-inner {
  display: flex;
  gap: 10px;
  padding-top: 8px;
}
.adv-inner input {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
}
.adv-inner input:focus {
  outline: none;
  border-color: var(--primary);
}

/* 右侧结果区 */
.panel-output {
  width: 45%;
  min-width: 300px;
  padding: 16px;
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-output h3 {
  font-size: 13px;
  color: #888;
  margin-bottom: 10px;
  font-weight: 500;
}
.output-content {
  flex: 1;
  overflow-y: auto;
  color: #d4d4d4;
  font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
}
.output-placeholder {
  color: #555;
  font-family: -apple-system, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}
.char-count { font-size: 12px; color: #6b7280; margin-top: 6px; text-align: right; }

/* 响应式 */
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .panel-output { width: 100%; min-width: unset; min-height: 200px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>提示词调试器</h1>
  <a href="/">← 返回主页</a>
</div>

<div class="main">
  <!-- 左侧输入 -->
  <div class="panel-input">
    <label>系统提示词 <span class="hint" id="sys-count">0 字</span></label>
    <textarea id="system-prompt" placeholder="可选，系统级指令（角色设定、输出格式等）"></textarea>

    <label>用户提示词 <span class="hint" id="user-count">0 字</span></label>
    <textarea id="user-prompt" placeholder="必填，具体的任务描述或问题"></textarea>

    <div class="toolbar">
      <button class="btn-submit" id="btn-submit" onclick="submitPrompt()">发送给 AI</button>
      <button class="btn-clear" onclick="clearAll()">清空</button>
      <span class="status status-idle" id="status">就绪</span>
    </div>

    <details>
      <summary>高级选项</summary>
      <div class="adv-inner">
        <input type="password" id="api-key" placeholder="API Key（留空使用系统配置）" autocomplete="off" />
        <input type="text" id="model" placeholder="模型（默认 deepseek-v4-flash）" />
        <input type="text" id="base-url" placeholder="API 端点（留空使用默认）" />
      </div>
    </details>
  </div>

  <!-- 右侧结果 -->
  <div class="panel-output">
    <h3>AI 返回结果</h3>
    <div class="output-content" id="output">
      <div class="output-placeholder">提交提示词后，AI 返回结果将显示在此处</div>
    </div>
    <div class="char-count" id="result-count"></div>
  </div>
</div>

<script>
const systemPrompt = document.getElementById('system-prompt');
const userPrompt = document.getElementById('user-prompt');
const sysCount = document.getElementById('sys-count');
const userCount = document.getElementById('user-count');
const btnSubmit = document.getElementById('btn-submit');
const status = document.getElementById('status');
const output = document.getElementById('output');
const resultCount = document.getElementById('result-count');

systemPrompt.addEventListener('input', () => sysCount.textContent = systemPrompt.value.length + ' 字');
userPrompt.addEventListener('input', () => userCount.textContent = userPrompt.value.length + ' 字');

async function submitPrompt() {
  const user = userPrompt.value.trim();
  if (!user) { alert('请输入用户提示词'); return; }

  const body = {
    system_prompt: systemPrompt.value,
    user_prompt: user,
    api_key: document.getElementById('api-key').value.trim(),
    model: document.getElementById('model').value.trim(),
    base_url: document.getElementById('base-url').value.trim(),
  };

  btnSubmit.disabled = true;
  status.className = 'status status-running';
  status.textContent = '请求中...';
  output.innerHTML = '<div class="output-placeholder">等待 AI 响应...</div>';

  try {
    const resp = await fetch('/api/test-prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || '请求失败');
    output.textContent = data.result;
    resultCount.textContent = data.result.length + ' 字';
    status.className = 'status status-done';
    status.textContent = '完成';
  } catch (e) {
    output.innerHTML = '<span style="color:#ef4444">错误: ' + e.message + '</span>';
    status.className = 'status status-error';
    status.textContent = '失败';
  } finally {
    btnSubmit.disabled = false;
  }
}

function clearAll() {
  systemPrompt.value = '';
  userPrompt.value = '';
  sysCount.textContent = '0 字';
  userCount.textContent = '0 字';
  output.innerHTML = '<div class="output-placeholder">提交提示词后，AI 返回结果将显示在此处</div>';
  resultCount.textContent = '';
  status.className = 'status status-idle';
  status.textContent = '就绪';
}

// Ctrl+Enter 快捷键提交
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    submitPrompt();
  }
});
</script>
</body>
</html>
