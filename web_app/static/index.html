<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI生成项目报账文档</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f2f5;
  --panel-bg: #fff;
  --border: #e0e0e0;
  --text: #333;
  --text-secondary: #666;
  --log-bg: #1a1a2e;
  --log-text: #d4d4d4;
  --primary: #4a6cf7;
  --primary-hover: #3651d5;
  --success: #22c55e;
  --warning: #f59e0b;
  --error: #ef4444;
  --radius: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

.header {
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .version { font-size: 12px; color: var(--text-secondary); }

.app {
  display: flex;
  height: calc(100vh - 49px);
}

/* 左侧配置面板 */
.panel-left {
  width: 380px;
  min-width: 380px;
  padding: 20px;
  background: var(--panel-bg);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

/* 模式切换 */
.mode-toggle {
  display: flex;
  background: var(--bg);
  border-radius: var(--radius);
  padding: 3px;
}
.mode-toggle button {
  flex: 1;
  padding: 8px 12px;
  border: none;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  color: var(--text-secondary);
}
.mode-toggle button.active {
  background: var(--primary);
  color: #fff;
}

.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}
.form-group input,
.form-group select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  background: #fff;
  transition: border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(74,108,247,0.1);
}
.form-group input[type="file"] { padding: 6px 8px; }
.form-group input[type="password"] { -webkit-text-security: disc; }

.file-name {
  font-size: 12px;
  color: var(--primary);
  margin-top: 2px;
  word-break: break-all;
}

/* 高级选项折叠 */
details { margin-top: 4px; }
details summary {
  font-size: 13px;
  color: var(--primary);
  cursor: pointer;
  user-select: none;
}
details .adv-inner {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-top: 12px;
}

.btn-start {
  padding: 10px 16px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-start:hover { background: var(--primary-hover); }
.btn-start:disabled {
  background: #a5b4fc;
  cursor: not-allowed;
}

.status {
  text-align: center;
  font-size: 13px;
  font-weight: 500;
}
.status-idle { color: var(--text-secondary); }
.status-running { color: var(--primary); }
.status-done { color: var(--success); }
.status-error { color: var(--error); }

/* 右侧面板 */
.panel-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.log-panel {
  flex: 1;
  padding: 16px 20px;
  overflow-y: auto;
  background: var(--log-bg);
  font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
  font-size: 13px;
  line-height: 1.6;
}
.log-placeholder {
  color: #555;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-family: -apple-system, sans-serif;
  font-size: 14px;
}
.log-entry { display: flex; gap: 8px; padding: 1px 0; }
.log-time { color: #6b7280; flex-shrink: 0; }
.log-level { flex-shrink: 0; font-weight: 600; min-width: 48px; }
.log-level.INFO { color: #60a5fa; }
.log-level.DEBUG { color: #9ca3af; }
.log-level.WARNING { color: var(--warning); }
.log-level.ERROR { color: var(--error); }
.log-level.DONE { color: var(--success); }
.log-msg { color: var(--log-text); word-break: break-all; }

.done-banner {
  text-align: center;
  padding: 8px;
  color: var(--success);
  font-weight: 600;
  border-top: 1px solid rgba(34,197,94,0.3);
  border-bottom: 1px solid rgba(34,197,94,0.3);
  margin: 4px 0;
}

/* 操作栏 */
.action-bar {
  padding: 14px 20px;
  background: var(--panel-bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.action-bar .info-text {
  font-size: 13px;
  color: var(--text-secondary);
  flex: 1;
}
.btn-action {
  padding: 8px 20px;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-download {
  background: var(--success);
  color: #fff;
}
.btn-download:hover { background: #16a34a; }
.btn-download:disabled {
  background: #86efac;
  cursor: not-allowed;
}
.btn-open {
  background: var(--primary);
  color: #fff;
}
.btn-open:hover { background: var(--primary-hover); }
.btn-open:disabled {
  background: #a5b4fc;
  cursor: not-allowed;
}
.btn-reset {
  background: var(--bg);
  color: var(--text-secondary);
}
.btn-reset:hover { background: var(--border); }
.btn-ai {
  background: #8b5cf6;
  color: #fff;
}
.btn-ai:hover { background: #7c3aed; }
.btn-ai:disabled {
  background: #c4b5fd;
  cursor: not-allowed;
}

/* AI 交互弹窗 */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #fff;
  border-radius: var(--radius);
  width: 90vw;
  max-width: 900px;
  height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h3 { font-size: 16px; }
.modal-header .btn-close {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--text-secondary);
  padding: 4px 8px;
  border-radius: 4px;
}
.modal-header .btn-close:hover { background: var(--bg); }
.modal-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.modal-tabs button {
  padding: 8px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.modal-tabs button.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
  font-weight: 600;
}
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}
.modal-body pre {
  background: #1a1a2e;
  color: #d4d4d4;
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
  margin-bottom: 16px;
}
.interaction-item {
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
  overflow: hidden;
}
.interaction-header {
  padding: 8px 14px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.interaction-header:hover { background: #e5e7eb; }
.interaction-header .tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
}
.tag-prompt { background: #dbeafe; color: #1d4ed8; }
.tag-response { background: #dcfce7; color: #16a34a; }
.interaction-body {
  display: none;
  padding: 10px 14px;
  background: #1a1a2e;
  color: #d4d4d4;
  font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 400px;
  overflow-y: auto;
}
.interaction-body.open { display: block; }
.loading-spinner {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-secondary);
}

/* 响应式：小屏幕改为上下布局 */
@media (max-width: 768px) {
  .app { flex-direction: column; }
  .panel-left { width: 100%; min-width: unset; max-height: 50vh; }
}
</style>
</head>
<body>

<div class="header">
  <h1>AI生成项目报账文档</h1>
  <span class="version" id="version-info">v-</span>
  <a href="/config" style="font-size:13px;color:var(--primary);text-decoration:none">配置</a>
  <a href="/prompt-debug" style="font-size:13px;color:var(--primary);text-decoration:none">提示词调试</a>
</div>

<div class="app">
  <!-- 左侧：配置区 -->
  <div class="panel-left" id="panel-config">
    <div class="section-title">使用方式</div>
    <div class="mode-toggle">
      <button id="btn-local" class="active" onclick="switchMode('local')">本机</button>
      <button id="btn-remote" onclick="switchMode('remote')">远程</button>
    </div>

    <div class="form-group">
      <label for="mode">操作模式</label>
      <select id="mode"></select>
    </div>

    <!-- 本机模式：路径输入 -->
    <div id="local-inputs">
      <div class="form-group">
        <label for="xlsx-path">功能清单 .xlsx 路径</label>
        <input type="text" id="xlsx-path" placeholder="C:\...\功能清单.xlsx" />
      </div>
      <div class="form-group">
        <label for="output-dir">输出目录（默认 xlsx 同级）</label>
        <input type="text" id="output-dir" placeholder="留空使用默认" />
      </div>
    </div>

    <!-- 远程模式：文件上传 -->
    <div id="remote-inputs" style="display:none">
      <div class="form-group">
        <label for="file-upload">上传功能清单 .xlsx</label>
        <input type="file" id="file-upload" accept=".xlsx" />
        <span class="file-name" id="file-name"></span>
      </div>
    </div>

    <details>
      <summary>高级选项</summary>
      <div class="adv-inner" style="flex-wrap:wrap">
        <div class="form-group" style="min-width:140px;flex:1">
          <label for="api-key">API Key（留空使用系统配置）</label>
          <input type="password" id="api-key" placeholder="sk-..." autocomplete="off" />
        </div>
        <div class="form-group" style="min-width:140px;flex:1">
          <label for="model">模型</label>
          <input type="text" id="model" placeholder="deepseek-v4-flash" />
        </div>
        <div class="form-group" style="min-width:140px;flex:1">
          <label for="base-url">API 端点</label>
          <input type="text" id="base-url" placeholder="留空使用默认" />
        </div>
        <div class="form-group" style="min-width:100px;flex:1">
          <label for="max-tokens">Max Tokens</label>
          <input type="text" id="max-tokens" placeholder="留空使用默认" />
        </div>
        <div class="form-group" style="min-width:140px;flex:1">
          <label for="project-name">项目名称（留空自动读取）</label>
          <input type="text" id="project-name" placeholder="自动从 xlsx 读取" />
        </div>
        <div class="form-group" style="min-width:80px;flex:0 0 auto;justify-content:center;padding-top:18px">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:400">
            <input type="checkbox" id="clean" /> 删除旧输出
          </label>
        </div>
      </div>
    </details>

    <!-- 自定义模板（折叠） -->
    <details id="templates-section">
      <summary>自定义模板</summary>
      <div class="adv-inner" style="flex-wrap:wrap">
        <div class="form-group" style="min-width:180px;flex:1">
          <label for="fpa-template">FPA 工作量评估模板</label>
          <input type="file" id="fpa-template" accept=".xlsx,.xlsm" />
        </div>
        <div class="form-group" style="min-width:180px;flex:1">
          <label for="cosmic-template">COSMIC 拆分表模板</label>
          <input type="file" id="cosmic-template" accept=".xlsx,.xlsm" />
        </div>
        <div class="form-group" style="min-width:180px;flex:1">
          <label for="list-template">需求清单模板</label>
          <input type="file" id="list-template" accept=".xlsx,.xlsm" />
        </div>
        <div class="form-group" style="min-width:180px;flex:1">
          <label for="spec-template">需求说明书模板</label>
          <input type="file" id="spec-template" accept=".docx" />
        </div>
      </div>
    </details>

    <button class="btn-start" id="btn-start" onclick="startTask()">开始生成</button>
    <div class="status status-idle" id="status">就绪</div>
  </div>

  <!-- 右侧：日志 + 操作 -->
  <div class="panel-right">
    <div class="log-panel" id="log-panel">
      <div class="log-placeholder" id="log-placeholder">
        选择操作模式并开始生成，实时日志将显示在此处
      </div>
    </div>

    <div class="action-bar">
      <span class="info-text" id="action-hint"></span>
      <button class="btn-action btn-open" id="btn-open" disabled onclick="openFolder()">打开产物目录</button>
      <button class="btn-action btn-download" id="btn-download" disabled onclick="download()">下载产物 .zip</button>
      <button class="btn-action btn-ai" id="btn-ai" disabled onclick="showAIInteractions()">AI 交互</button>
      <button class="btn-action btn-reset" id="btn-reset" style="display:none" onclick="resetUI()">新任务</button>
    </div>
  </div>
</div>

<!-- AI 交互弹窗 -->
<div class="modal-overlay" id="ai-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>AI 交互记录</h3>
      <button class="btn-close" onclick="closeAIModal()">&times;</button>
    </div>
    <div class="modal-tabs">
      <button class="active" onclick="switchAITab('list')">交互列表</button>
      <button onclick="switchAITab('combined')">合并日志</button>
    </div>
    <div class="modal-body" id="ai-modal-body">
      <div class="loading-spinner">加载中...</div>
    </div>
  </div>
</div>

<script>
// ── 状态 ──────────────────────────────────────────────────
let currentMode = 'local';   // 'local' | 'remote'
let currentSession = null;
let eventSource = null;
let modeOptions = {};

// ── 初始化 ────────────────────────────────────────────────
async function init() {
  try {
    const resp = await fetch('/api/modes');
    modeOptions = await resp.json();
    const sel = document.getElementById('mode');
    for (const [value, info] of Object.entries(modeOptions)) {
      const opt = document.createElement('option');
      opt.value = value;
      opt.textContent = info.label;
      sel.appendChild(opt);
    }
  } catch (e) {
    console.error('加载模式列表失败', e);
  }

  // 版本号
  try {
    const resp = await fetch('/api/modes');
    document.getElementById('version-info').textContent = 'v5.0.0';
  } catch (e) {}
}

// ── 模式切换 ──────────────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('btn-local').classList.toggle('active', mode === 'local');
  document.getElementById('btn-remote').classList.toggle('active', mode === 'remote');
  document.getElementById('local-inputs').style.display = mode === 'local' ? '' : 'none';
  document.getElementById('remote-inputs').style.display = mode === 'remote' ? '' : 'none';

  // 切换操作按钮可见性
  document.getElementById('btn-open').style.display = mode === 'local' ? '' : 'none';
  document.getElementById('btn-download').style.display = mode === 'remote' ? '' : 'none';

  // 重置文件选择
  if (mode === 'remote') {
    document.getElementById('file-name').textContent = '';
  }

  resetForNewTask();
}

// ── 文件选择反馈 ──────────────────────────────────────────
document.getElementById('file-upload').addEventListener('change', function() {
  const name = this.files[0] ? this.files[0].name : '';
  document.getElementById('file-name').textContent = name ? '已选: ' + name : '';
});

// ── 开始任务 ──────────────────────────────────────────────
async function startTask() {
  const mode = document.getElementById('mode').value;
  const apiKey = document.getElementById('api-key').value.trim();
  const model = document.getElementById('model').value.trim();
  const baseUrl = document.getElementById('base-url').value.trim();

  if (!mode) {
    alert('请选择操作模式');
    return;
  }

  // 收集通用参数
  function appendCommon(body) {
    if (apiKey) body.append('api_key', apiKey);
    if (model) body.append('model', model);
    if (baseUrl) body.append('base_url', baseUrl);
    const mt = document.getElementById('max-tokens').value.trim();
    if (mt) body.append('max_tokens', mt);
    const pn = document.getElementById('project-name').value.trim();
    if (pn) body.append('project_name', pn);
    if (document.getElementById('clean').checked) body.append('clean', '1');
    for (const [key, fid] of [['fpa_template','fpa-template'], ['cosmic_template','cosmic-template'], ['list_template','list-template'], ['spec_template','spec-template']]) {
      const f = document.getElementById(fid).files[0];
      if (f) body.append(key, f);
    }
  }

  // 构建请求
  let url, body, isJson;
  if (currentMode === 'local') {
    const xlsxPath = document.getElementById('xlsx-path').value.trim();
    if (!xlsxPath) { alert('请输入功能清单 .xlsx 路径'); return; }
    const outputDir = document.getElementById('output-dir').value.trim();
    url = '/api/run-local';
    body = new FormData();
    body.append('xlsx_path', xlsxPath);
    body.append('output_dir', outputDir);
    body.append('mode', mode);
    appendCommon(body);
    isJson = false;
  } else {
    const fileInput = document.getElementById('file-upload');
    if (!fileInput.files[0]) { alert('请选择要上传的 .xlsx 文件'); return; }
    url = '/api/run-upload';
    body = new FormData();
    body.append('file', fileInput.files[0]);
    body.append('mode', mode);
    appendCommon(body);
    isJson = false;
  }

  // UI 进入运行状态
  setRunning(true);

  try {
    const resp = await fetch(url, { method: 'POST', body });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || `请求失败 (${resp.status})`);
    }
    const data = await resp.json();
    currentSession = data.session_id;
    if (data.output_dir) {
      document.getElementById('action-hint').textContent = '产物目录: ' + data.output_dir;
    }
    connectLogStream(currentSession);
  } catch (e) {
    appendLog('ERROR', e.message, now());
    setRunning(false);
  }
}

// ── SSE 日志流 ────────────────────────────────────────────
function connectLogStream(sessionId) {
  if (eventSource) { eventSource.close(); }
  eventSource = new EventSource('/api/log-stream?session=' + sessionId);

  eventSource.onmessage = function(e) {
    try {
      const data = JSON.parse(e.data);
      if (data.level === 'DONE') {
        appendLog('DONE', '── 任务完成 ──', '');
        onTaskDone();
      } else {
        appendLog(data.level, data.msg, data.time || '');
      }
    } catch (err) {
      // 心跳或非 JSON，忽略
    }
  };

  eventSource.onerror = function() {
    // SSE 连接中断（可能是 DONE 后主动关闭），不额外处理
  };
}

// ── 日志追加 ──────────────────────────────────────────────
function appendLog(level, msg, time) {
  const panel = document.getElementById('log-panel');
  const placeholder = document.getElementById('log-placeholder');
  if (placeholder) placeholder.remove();

  const entry = document.createElement('div');
  entry.className = 'log-entry';

  if (level === 'DONE') {
    entry.className = 'done-banner';
    entry.textContent = msg;
  } else {
    const spanTime = document.createElement('span');
    spanTime.className = 'log-time';
    spanTime.textContent = time;

    const spanLevel = document.createElement('span');
    spanLevel.className = 'log-level ' + level;
    spanLevel.textContent = level;

    const spanMsg = document.createElement('span');
    spanMsg.className = 'log-msg';
    spanMsg.textContent = msg;

    entry.appendChild(spanTime);
    entry.appendChild(spanLevel);
    entry.appendChild(spanMsg);
  }

  panel.appendChild(entry);
  panel.scrollTop = panel.scrollHeight;
}

// ── 任务完成 ──────────────────────────────────────────────
function onTaskDone() {
  setRunning(false);
  document.getElementById('status').className = 'status status-done';
  document.getElementById('status').textContent = '完成';

  if (currentMode === 'local') {
    document.getElementById('btn-open').disabled = false;
  } else {
    document.getElementById('btn-download').disabled = false;
  }
  document.getElementById('btn-ai').disabled = false;
  document.getElementById('btn-reset').style.display = '';
}

// ── 打开产物目录 ──────────────────────────────────────────
async function openFolder() {
  if (!currentSession) return;
  try {
    await fetch('/api/open-folder?session=' + currentSession);
  } catch (e) {
    console.error('打开目录失败', e);
  }
}

// ── 下载产物 ──────────────────────────────────────────────
function download() {
  if (!currentSession) return;
  const a = document.createElement('a');
  a.href = '/api/download/' + currentSession;
  a.click();
}

// ── UI 辅助 ───────────────────────────────────────────────
function setRunning(running) {
  const btn = document.getElementById('btn-start');
  const status = document.getElementById('status');
  btn.disabled = running;
  if (running) {
    status.className = 'status status-running';
    status.textContent = '运行中...';
    document.getElementById('btn-open').disabled = true;
    document.getElementById('btn-download').disabled = true;
    document.getElementById('btn-ai').disabled = true;
    document.getElementById('btn-reset').style.display = 'none';
    // 清空日志
    const panel = document.getElementById('log-panel');
    panel.innerHTML = '';
  }
}

function resetUI() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  resetForNewTask();
}

function resetForNewTask() {
  currentSession = null;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('status').className = 'status status-idle';
  document.getElementById('status').textContent = '就绪';
  document.getElementById('btn-open').disabled = true;
  document.getElementById('btn-download').disabled = true;
  document.getElementById('btn-ai').disabled = true;
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('action-hint').textContent = '';
  const panel = document.getElementById('log-panel');
  panel.innerHTML = '<div class="log-placeholder" id="log-placeholder">选择操作模式并开始生成，实时日志将显示在此处</div>';
}

function now() {
  return new Date().toLocaleTimeString('zh-CN', { hour12: false });
}

// ── AI 交互弹窗 ──────────────────────────────────────────
let aiTabMode = 'list';

async function showAIInteractions() {
  if (!currentSession) return;
  document.getElementById('ai-modal').classList.add('active');
  aiTabMode = 'list';
  document.querySelectorAll('.modal-tabs button').forEach((b, i) => b.classList.toggle('active', i === 0));
  await loadAIInteractions();
}

function closeAIModal() {
  document.getElementById('ai-modal').classList.remove('active');
}

function switchAITab(tab) {
  aiTabMode = tab;
  document.querySelectorAll('.modal-tabs button').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'list') || (i === 1 && tab === 'combined'));
  });
  if (tab === 'list') loadAIInteractions();
  else loadAICombinedLog();
}

async function loadAIInteractions() {
  const body = document.getElementById('ai-modal-body');
  body.innerHTML = '<div class="loading-spinner">加载中...</div>';
  try {
    const resp = await fetch('/api/ai-interactions/' + currentSession);
    if (!resp.ok) throw new Error((await resp.json()).detail);
    const data = await resp.json();
    if (data.count === 0) {
      body.innerHTML = '<div class="loading-spinner">暂无 AI 交互记录</div>';
      return;
    }
    let html = '';
    for (const item of data.interactions) {
      const tagClass = item.type === 'prompt' ? 'tag-prompt' : 'tag-response';
      const tagLabel = item.type === 'prompt' ? 'P' : 'R';
      const idx = item.name.replace(/[^0-9]/g, '').slice(-3) || item.name;
      html += '<div class="interaction-item">';
      html += '<div class="interaction-header" onclick="toggleInteraction(this)">';
      html += '<span><span class="tag ' + tagClass + '">' + tagLabel + '</span> ' + idx + ' — ' + escapeHtml(item.name) + '</span>';
      html += '<span style="font-size:12px;color:var(--text-secondary)">点击展开</span>';
      html += '</div>';
      html += '<div class="interaction-body">' + escapeHtml(item.content) + '</div>';
      html += '</div>';
    }
    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = '<div class="loading-spinner" style="color:#ef4444">加载失败: ' + e.message + '</div>';
  }
}

async function loadAICombinedLog() {
  const body = document.getElementById('ai-modal-body');
  body.innerHTML = '<div class="loading-spinner">加载中...</div>';
  try {
    const resp = await fetch('/api/ai-log/' + currentSession);
    if (!resp.ok) throw new Error((await resp.json()).detail);
    const data = await resp.json();
    body.innerHTML = '<pre>' + escapeHtml(data.content) + '</pre>';
  } catch (e) {
    body.innerHTML = '<div class="loading-spinner" style="color:#ef4444">加载失败: ' + e.message + '</div>';
  }
}

function toggleInteraction(el) {
  const body = el.nextElementSibling;
  body.classList.toggle('open');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── 启动 ──────────────────────────────────────────────────
init();
</script>
</body>
</html>
